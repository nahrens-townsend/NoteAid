services:
  - type: web
    name: noteaid-ai
    runtime: python
    plan: free
    rootDir: ai-service
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: DEEPGRAM_API_KEY
        sync: false

  - type: web
    name: noteaid-api
    runtime: ruby
    plan: free
    rootDir: backend
    buildCommand: bundle install
    startCommand: bundle exec puma -C config/puma.rb
    preDeployCommand: bundle exec rails db:migrate
    envVars:
      - key: RAILS_ENV
        value: production
      - key: SECRET_KEY_BASE
        sync: false
      - key: AI_SERVICE_URL
        sync: false
      - key: FRONTEND_ORIGIN
        sync: false
      - key: RAILS_LOG_LEVEL
        value: info
      - key: RAILS_MAX_THREADS
        value: "5"
